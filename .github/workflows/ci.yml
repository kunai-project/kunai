name: CI

on:
  schedule:
    - cron: "37 13 * * *"
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - arch: aarch64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      # we need to fetch rust deps first to speed up cargo xtask
      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo
            ~/.rustup
            target
          key: ${{ runner.os }}-${{ matrix.arch }}-rust-${{ hashFiles('**/Cargo.lock', '**/.github/workflows/ci.yml') }}

      - name: Install System Tools
        run: |
          set -euxo pipefail
          sudo apt update -y
          sudo apt install -y musl-tools libbpf-dev clang lld
          
      - name: Install Rust Tools
        run: |
          cargo install bpf-linker

          rustup toolchain install nightly-${{ matrix.arch }}-unknown-linux-gnu
          rustup component add rust-src --toolchain nightly-${{ matrix.arch }}-unknown-linux-gnu

      - name: Run clippy on full project
        run: cargo clippy -- -D warnings

      - name: Build (eBPF and userland)
        run: RUSTFLAGS="-C strip=debuginfo" cargo build --target ${{ matrix.target }}

      - name: Preparing files for upload
        run: |
          set -eux
          debug="target/${{ matrix.target }}/debug"
          tmp_debug="target.tmp/${{ matrix.target }}/debug/"
          mkdir -p $tmp_debug
          find $release -maxdepth 1 -type f -executable | xargs -I '{}' cp '{}' $tmp_debug

      - name: Upload target
        uses: actions/upload-artifact@v6
        with:
          name: target-${{ matrix.arch }}
          path: target.tmp

  tests:
    needs: build

    name: Testing on ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
            packages: qemu-system-x86
          - arch: aarch64
            runner: ubuntu-latest
            packages: qemu-system-arm

    steps:
      - name: Install system tools
        run: |
          sudo apt update
          sudo apt install -y ${{ matrix.packages }}

      - name: Checkout
        uses: actions/checkout@v3

      - uses: actions/download-artifact@v7
        with:
          name: target-${{ matrix.arch }}
          path: target

      - name: Make target bin exec
        run: chmod +x target/*/release/*

      - name: Set kernel cache key
        run: echo "KERNEL_CACHE_KEY=cache-vmlinuz-${{ matrix.arch }}-cache-$(date +%Y-%m-%d)" >> $GITHUB_ENV

      - name: Cache Linux Kernels
        uses: actions/cache@v4
        with:
          path: cache
          key: ${{ env.KERNEL_CACHE_KEY }}

      - name: Linux Kernel LTS 5.4
        env:
          ARCH: ${{ matrix.arch }}
        run: ./scripts/ci/test_kernel.sh 5.4

      - name: Linux Kernel LTS 5.10
        env:
          ARCH: ${{ matrix.arch }}
        run: ./scripts/ci/test_kernel.sh 5.10

      - name: Linux Kernel LTS 5.15
        env:
          ARCH: ${{ matrix.arch }}
        run: ./scripts/ci/test_kernel.sh 5.15

      - name: Linux Kernel LTS 6.1
        env:
          ARCH: ${{ matrix.arch }}
        run: ./scripts/ci/test_kernel.sh 6.1

      - name: Linux Kernel LTS 6.6
        env:
          ARCH: ${{ matrix.arch }}
        run: ./scripts/ci/test_kernel.sh 6.6
